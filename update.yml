name: Update World Cup data

on:
  schedule:
    - cron: "0 */6 * * *"     # κάθε 6 ώρες (UTC)
  workflow_dispatch:          # χειροκίνητο τρέξιμο από το UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Καμία εξωτερική βιβλιοθήκη — το script χρησιμοποιεί μόνο stdlib (urllib)

      - name: Fetch data
        id: fetch
        continue-on-error: true
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "ℹ️  Καμία αλλαγή στο data.json — δεν κάνω commit."
          else
            git add data.json
            git commit -m "🔄 Auto-update WC2026 data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ Έγινε push νέο data.json"
          fi
