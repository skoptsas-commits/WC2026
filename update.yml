name: Update World Cup data

# ── Πότε τρέχει ─────────────────────────────────────────────────
on:
  schedule:
    # Κάθε 6 ώρες (UTC). Σύνταξη cron: λεπτό ώρα ημέρα μήνας ημέρα-εβδομάδας
    - cron: "0 */6 * * *"
  workflow_dispatch:    # επιτρέπει και χειροκίνητο τρέξιμο από το GitHub UI

# ── Δικαιώματα ──────────────────────────────────────────────────
# Χρειάζεται write για να μπορεί να κάνει commit το data.json πίσω στο repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. Κατεβάζει το repo στον runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Στήνει Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Εγκαθιστά τις βιβλιοθήκες
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install soccerdata pandas

      # 4. Τρέχει το script. Αν αποτύχει (π.χ. Cloudflare 403),
      #    το continue-on-error αφήνει το workflow να συνεχίσει
      #    χωρίς να μαρκάρει αποτυχία — το παλιό data.json μένει ως έχει.
      - name: Fetch FBref data
        id: fetch
        continue-on-error: true
        run: python fetch_data.py

      # 5. Κάνει commit ΜΟΝΟ αν το data.json όντως άλλαξε
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "ℹ️  Καμία αλλαγή στο data.json — δεν κάνω commit."
          else
            git add data.json
            git commit -m "🔄 Auto-update WC2026 data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ Έγινε push νέο data.json"
          fi
